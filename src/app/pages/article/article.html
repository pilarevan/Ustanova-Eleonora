<div class="article-page">
  <section class="article-hero section-darker scroll-reveal">
    <div class="container">
      <a routerLink="/novosti" class="article__back">← {{ 'news.title' | translate }}</a>
      @if (image) {
      <img [src]="image" [alt]="title" class="article__image">
      }
      <h1>{{ title }}</h1>
      @if (date) {
        <p class="article__date" style="opacity:0.6;margin-top:0.5rem">{{ date | formatDate }}</p>
      }
    </div>
  </section>

  <section class="article-content section-light scroll-reveal">
    <div class="container">
      <p style="opacity:0.5;font-style:italic">Article content loading...</p>
    </div>
  </section>
</div>
