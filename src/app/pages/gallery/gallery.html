<div class="gallery-page">
  <section class="gallery-hero scroll-reveal">
    <div class="container">
      <h1>{{ 'gallery.title' | translate }}</h1>
    </div>
  </section>

  <section class="gallery-grid section-light scroll-reveal">
    <div class="container">
      <div class="gallery-grid__inner">
        <div
          *ngFor="let img of images"
          class="gallery-item"
          [class.is-visible]="visibleIds.has(img.id)"
          [attr.data-id]="img.id"
          (click)="openLightbox(img)"
        >
          <img [src]="img.src" alt="" loading="lazy">
        </div>
      </div>
    </div>
  </section>

  <div class="gallery-lightbox" *ngIf="selectedImage" (click)="closeLightbox()">
    <button class="gallery-lightbox__close" (click)="closeLightbox()">×</button>
    <img [src]="selectedImage.src" alt="" (click)="$event.stopPropagation()">
  </div>
</div>
