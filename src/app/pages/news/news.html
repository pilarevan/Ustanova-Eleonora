<div class="news-page">
  <section class="news-hero section-darker">
    <div class="container">
      <h1>{{ 'news.title' | translate }}</h1>
    </div>
  </section>

  <section class="news-list section-light">
    <div class="container">
      <div class="news-list__grid">
        @for (item of news; track item.slug) {
        <article class="news-item">
          @if (item.image) {
          <img [src]="item.image" [alt]="item.title" class="news-item__image">
          }
          <span class="news-item__date">{{ item.date | formatDate }}</span>
          <h2 class="news-item__title">{{ item.title }}</h2>
          <a [routerLink]="['/novosti', item.slug]" class="news-item__link">{{ 'news.readMore' | translate }} →</a>
        </article>
        }
      </div>
    </div>
  </section>
</div>
